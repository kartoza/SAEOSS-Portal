limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

upstream backend {
    server 10.150.16.183:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name saeoss.sansa.org.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name saeoss.sansa.org.za;

    ssl_certificate /etc/ssl/sansa-public.crt;
    ssl_certificate_key /etc/ssl/sansa-private.key;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    send_timeout 120s;

    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_buffer_size 32k;

    location /images/ { 
        alias /var/www/images/images/;
        try_files $uri =404; 
        access_log off; 
        expires 30d; 
    } 
    
    location /base/ {
        alias /home/appuser/data/webassets/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
        
    #Optional: favicon 
    location = /favicon.ico { 
      log_not_found off; 
      access_log off; 
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
